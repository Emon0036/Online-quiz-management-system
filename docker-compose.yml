version: '3.8'

services:
  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: piston-api
    ports:
      - "2000:2000"
    environment:
      - TIMEOUT=10
      - MEMORY_LIMIT=256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2000/api/v2/runtimes"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - piston_data:/piston

volumes:
  piston_data:
